<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Brain Problem Detector</title>
    <link rel="stylesheet" href="../static/css/cluster.css">
    <link rel="stylesheet" href="../static/css/animations.css">
    <style>
        .mode-row {
            display:flex; align-items:center; justify-content:center;
            gap:12px; margin-bottom:14px;
        }
        .toggle-wrap {
            position:relative; display:inline-block; width:52px; height:28px;
        }
        .toggle-wrap input { opacity:0; width:0; height:0; }
        .toggle-slider {
            position:absolute; inset:0;
            background:#ccc; border-radius:28px; cursor:pointer;
            transition:background .2s ease;
        }
        .toggle-slider::before {
            content:''; position:absolute;
            width:22px; height:22px; left:3px; bottom:3px;
            background:#fff; border-radius:50%;
            transition:transform .2s ease;
            box-shadow:0 1px 4px rgba(0,0,0,.2);
        }
        .toggle-wrap input:checked + .toggle-slider { background:#333; }
        .toggle-wrap input:checked + .toggle-slider::before { transform:translateX(24px); }
        #mode-label {
            font-size:.9em; font-weight:500; color:#555;
            min-width:230px; transition:color .2s;
        }
    </style>
</head>
<body>
<header>
    <div class="logo-wrap">
        <div class="logo-badge">SB</div>
        <h1>Split Brain Problem Detector</h1>
    </div>
    <div class="menu">
        <a href="/" class="button">Головна сторінка</a>
        <a href="/teach" class="button">Навчання моделі</a>
        <a href="/info" class="button">Інформаційна сторінка</a>
    </div>
</header>

<section class="graph-section">
    <h2>Графічне введення</h2>

    <div class="mode-row">
        <span style="font-size:.9em;color:#888">Базові моделі</span>
        <label class="toggle-wrap">
            <input type="checkbox" id="mode-toggle">
            <span class="toggle-slider"></span>
        </label>
        <span id="mode-label">Режим: Базові &nbsp;(RF · GB · CB)</span>
    </div>

    <div class="tools">
        <label for="node-name">Назва ноди:</label>
        <input type="text" id="node-name" placeholder="Введіть назву">
        <button id="create-node">Додати ноду</button>
        <div>
            <button id="line-one-way">Лінія в один бік</button>
            <button id="line-two-way">Лінія в два боки</button>
            <button id="erase">Стерти</button>
        </div>
    </div>

    <canvas id="graph-canvas" width="600" height="400"></canvas>

    <div id="matrix-display">
        <h3>Матриця зв'язків:</h3>
        <table id="matrix"></table>
    </div>

    <button id="submit-matrix">Відправити</button>

    <div id="result" class="hidden"></div>
</section>

<script src="../static/scripts/cluster.js"></script>
<script src="../static/scripts/toast.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
</body>
</html>
